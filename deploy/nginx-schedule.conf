# 予定表アプリ用 Nginx 設定
#   /etc/nginx/sites-available/schedule に置き、sites-enabled へリンクして有効化。
#   Service Worker には HTTPS が必須なので、ここで TLS を終端する。
#   バックエンドは Gunicorn（127.0.0.1:5001）。

# HTTP は HTTPS へリダイレクト
server {
    listen 80;
    server_name _;

    # ルート証明書だけは HTTP でも配信（端末がまだ CA を信頼していない初回でも落とせるように）
    location = /rootCA.pem {
        alias /home/pi/schedule_app/server/certs/rootCA.pem;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="rootCA.pem"';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # 証明書（mkcert / 自己署名。README 1-4 で作成したもの）
    ssl_certificate     /home/pi/schedule_app/server/certs/cert.pem;
    ssl_certificate_key /home/pi/schedule_app/server/certs/key.pem;

    client_max_body_size 5m;

    # ルート証明書の配信（HTTPS 側でも取れるように）
    location = /rootCA.pem {
        alias /home/pi/schedule_app/server/certs/rootCA.pem;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="rootCA.pem"';
    }

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
