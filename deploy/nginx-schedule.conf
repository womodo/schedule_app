# =============================================================================
# schedule アプリ用 nginx 設定（/schedule サブパス配信）
#
# 構成: Tailscale serve(HTTPS終端) → nginx:80 → Gunicorn 127.0.0.1:5001
#   tailscale serve --bg 80   で https://<host>.<tailnet>.ts.net/ を nginx:80 へ転送し、
#   nginx が下記のようにパスでアプリを振り分ける。HTTPS は Tailscale 層が担うので
#   nginx 自身は :80（HTTP）でよい（外部には晒さない・VPN内のみ）。
#
# このファイルは「server { listen 80; } の中に貼る location 断片」として書いてある。
# ラズパイの共有 server ブロック（例 /etc/nginx/sites-available/raspi）に取り込む想定。
# 同じ server ブロックに他アプリを足す例（実体構築は本リポジトリの対象外）:
#
#   server {
#       listen 80 default_server;
#       server_name _;
#
#       location = /study  { return 301 /study/; }
#       location /study/   { proxy_pass http://127.0.0.1:5000/; include proxy_params; }
#
#       # ↓ ここに本ファイルの /schedule ブロックを入れる（Gunicorn :5001）
#
#       location /wbgt/    { alias /var/www/html/wbgt/;  index index.php; }   # PHP-FPM
#       location /stats/   { alias /var/www/html/stats/; index index.php; }   # PHP-FPM
#   }
# =============================================================================

# 末尾スラッシュを強制する。schedule のフロントは相対パス（css/... js/... api/...）で
# 動くため、ブラウザの基準 URL は必ず /schedule/（末尾スラッシュ付き）である必要がある。
location = /schedule {
    return 301 /schedule/;
}

# /schedule/ 以下を Gunicorn へ転送。proxy_pass の末尾 "/" が肝で、
# これにより nginx は "/schedule" を取り除いてから Flask に渡す
#   ブラウザ:  /schedule/api/me  →  Flask: /api/me
# そのため Flask 側のルート定義（/・/api/*）は無改修のまま動く。
location /schedule/ {
    proxy_pass http://127.0.0.1:5001/;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    # Tailscale serve が HTTPS を終端して nginx には http で渡すが、
    # 体感上は https なので Secure Cookie を成立させるため https を明示する。
    proxy_set_header X-Forwarded-Proto https;

    proxy_read_timeout 60s;
}
